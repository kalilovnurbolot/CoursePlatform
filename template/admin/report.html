{{define "adminReport"}}
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f3f4f6; }
        main { flex-grow: 1; }
    </style>
    <script>const I18N = {{.TransJSON}};</script>
    <script>function t(k){return I18N[k]||k;}</script>
    <script>
        function toggleUserMenu() {
            document.getElementById('user-menu').classList.toggle('hidden');
        }
    </script>
</head>
<body>
{{template "adminBarPanel" .}}
<main class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8" style="margin-top: 56px">
    <h1 class="text-3xl font-bold text-gray-900">{{ T .Lang "admin.report_title" }}</h1>
    <p class="mt-4 text-gray-600">{{ T .Lang "admin.report_desc" }}</p>
</main>
</body>
</html>
{{end}}
