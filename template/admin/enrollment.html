{{define "adminEnrollments"}}
<html lang="{{.Lang}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: #f3f4f6; }
        main { flex-grow: 1; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    <script>const I18N = {{.TransJSON}};</script>
    <script>function t(k){return I18N[k]||k;}</script>
    <script>
        function toggleUserMenu() {
            document.getElementById('user-menu').classList.toggle('hidden');
        }
    </script>
</head>
<body>

{{template "adminBarPanel" .}}

<main class="max-w-7xl mx-auto pb-12 px-4 sm:px-6 lg:px-7 pt-[90px]" style="margin-top: 45px">

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8 transition-all hover:shadow-md">
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">

            <div class="md:col-span-3">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ T .Lang "admin.enroll_search" }}</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="filter-search" placeholder="{{ T .Lang "admin.enroll_search_placeholder" }}"
                           class="w-full pl-10 border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="md:col-span-3">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ T .Lang "admin.enroll_col_course" }}</label>
                <div class="relative">
                    <select id="filter-course" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white appearance-none">
                        <option value="0">{{ T .Lang "admin.enroll_all_courses" }}</option>
                        {{range .Courses}}
                        <option value="{{.ID}}">{{.Title}}</option>
                        {{end}}
                    </select>
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-500">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </span>
                </div>
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ T .Lang "admin.enroll_col_status" }}</label>
                <div class="relative">
                    <select id="filter-status" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-white appearance-none">
                        <option value="all">{{ T .Lang "admin.enroll_status_all" }}</option>
                        <option value="pending" selected>{{ T .Lang "admin.enroll_status_pending" }}</option>
                        <option value="approved">{{ T .Lang "admin.enroll_status_approved" }}</option>
                        <option value="rejected">{{ T .Lang "admin.enroll_status_rejected" }}</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-gray-500">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </span>
                </div>
            </div>

            <div class="md:col-span-3">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">{{ T .Lang "admin.enroll_period_from" }}</label>
                <input type="date" id="filter-date-from" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-600 focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div class="md:col-span-1">
                <button onclick="applyFilters()" class="w-full bg-indigo-600 text-white h-[42px] rounded-lg text-sm font-bold hover:bg-indigo-700 transition shadow-sm active:transform active:scale-95 flex items-center justify-center">
                    <i class="fas fa-filter mr-2 md:mr-0 lg:mr-0"></i> <span class="md:hidden lg:hidden">{{ T .Lang "admin.enroll_find" }}</span>
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden min-h-[400px] flex flex-col">
        <div class="overflow-x-auto flex-grow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">{{ T .Lang "admin.enroll_col_student" }}</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">{{ T .Lang "admin.enroll_col_course" }}</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">{{ T .Lang "admin.enroll_col_date" }}</th>
                    <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">{{ T .Lang "admin.enroll_col_status" }}</th>
                    <th class="px-6 py-4 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">{{ T .Lang "admin.enroll_col_actions" }}</th>
                </tr>
                </thead>
                <tbody id="enrollments-table" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>

        <div id="table-loader" class="flex flex-col items-center justify-center py-20 hidden">
            <i class="fas fa-circle-notch fa-spin text-indigo-600 text-4xl mb-4"></i>
            <p class="text-gray-500 text-sm font-medium" id="loading-text"></p>
        </div>

        <div id="empty-state" class="flex flex-col items-center justify-center py-20 hidden">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4 text-gray-400">
                <i class="fas fa-folder-open text-3xl"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-900" id="empty-title"></h3>
            <p class="text-gray-500 text-sm mt-1" id="empty-desc"></p>
        </div>

        <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex items-center justify-between">
            <button onclick="changePage(-1)" class="flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" id="btn-prev">
                <i class="fas fa-chevron-left mr-2 text-xs"></i> <span id="btn-prev-text"></span>
            </button>
            <span id="page-info" class="text-sm font-medium text-gray-600"></span>
            <button onclick="changePage(1)" class="flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" id="btn-next">
                <span id="btn-next-text"></span> <i class="fas fa-chevron-right ml-2 text-xs"></i>
            </button>
        </div>
    </div>

</main>

<script>
    let currentPage = 1;
    const limit = 10;
    let totalPages = 1;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('loading-text').textContent = t('admin.enroll_loading');
        document.getElementById('empty-title').textContent = t('admin.enroll_empty_title');
        document.getElementById('empty-desc').textContent = t('admin.enroll_empty_desc');
        document.getElementById('btn-prev-text').textContent = t('admin.enroll_prev');
        document.getElementById('btn-next-text').textContent = t('admin.enroll_next');
        fetchEnrollments();
    });

    function applyFilters() {
        currentPage = 1;
        fetchEnrollments();
    }

    function changePage(delta) {
        const newPage = currentPage + delta;
        if (newPage < 1 || newPage > totalPages) return;
        currentPage = newPage;
        fetchEnrollments();
    }

    async function fetchEnrollments() {
        const search = document.getElementById('filter-search').value;
        const courseId = document.getElementById('filter-course').value;
        const status = document.getElementById('filter-status').value;
        const dateFrom = document.getElementById('filter-date-from').value;

        const tbody = document.getElementById('enrollments-table');
        const loader = document.getElementById('table-loader');
        const empty = document.getElementById('empty-state');

        tbody.innerHTML = '';
        loader.classList.remove('hidden');
        empty.classList.add('hidden');

        const params = new URLSearchParams({
            page: currentPage,
            limit: limit,
            search: search,
            course_id: courseId,
            status: status,
            date_from: dateFrom
        });

        try {
            const res = await fetch(`/api/admin/enrollments?${params.toString()}`);
            if (!res.ok) throw new Error("API Error");

            const result = await res.json();
            totalPages = result.pages || 1;
            renderTable(result.data);
            updatePaginationUI(result.page, totalPages);

        } catch (error) {
            console.error(error);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500 font-medium">${t('admin.enroll_error_load')}</td></tr>`;
        } finally {
            loader.classList.add('hidden');
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('enrollments-table');
        const empty = document.getElementById('empty-state');

        if (!data || data.length === 0) {
            empty.classList.remove('hidden');
            return;
        }

        data.forEach(item => {
            let badgeClass = "bg-gray-100 text-gray-800";
            let badgeText = item.status;

            if (item.status === 'pending') {
                badgeClass = "bg-amber-50 text-amber-700 border border-amber-200 ring-1 ring-amber-200/50";
                badgeText = `<span class="flex items-center gap-1.5"><span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span></span> ${t('admin.enroll_badge_pending')}</span>`;
            } else if (item.status === 'approved') {
                badgeClass = "bg-emerald-50 text-emerald-700 border border-emerald-200";
                badgeText = `<span class="flex items-center gap-1.5"><i class="fas fa-check-circle text-xs"></i> ${t('admin.enroll_badge_approved')}</span>`;
            } else if (item.status === 'rejected') {
                badgeClass = "bg-rose-50 text-rose-700 border border-rose-200";
                badgeText = `<span class="flex items-center gap-1.5"><i class="fas fa-times-circle text-xs"></i> ${t('admin.enroll_badge_rejected')}</span>`;
            }

            const lang = "{{.Lang}}";
            const dateLocale = lang === 'en' ? 'en-GB' : (lang === 'ky' ? 'ru-RU' : 'ru-RU');
            const dateStr = new Date(item.CreatedAt).toLocaleDateString(dateLocale, {
                day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });

            const userNameEncoded = encodeURIComponent(item.user.Name);
            const avatar = item.user.Picture || `https://ui-avatars.com/api/?name=${userNameEncoded}&background=6366f1&color=fff&size=128`;

            const row = `
                <tr class="hover:bg-gray-50 transition fade-in group">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="flex-shrink-0 h-10 w-10 relative">
                                <img class="h-10 w-10 rounded-full object-cover border border-gray-200 shadow-sm" src="${avatar}" alt="">
                                ${item.status === 'pending' ? '<span class="absolute top-0 right-0 block h-2.5 w-2.5 rounded-full ring-2 ring-white bg-amber-400"></span>' : ''}
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-bold text-gray-900 group-hover:text-indigo-600 transition-colors">${item.user.Name}</div>
                                <div class="text-xs text-gray-500">${item.user.Email}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded text-xs font-medium bg-indigo-50 text-indigo-800">
                            ${item.course.title || t('admin.enroll_deleted_course')}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${dateStr}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${badgeClass}">${badgeText}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        ${item.status === 'pending' ? `
                            <div class="flex justify-end space-x-2">
                                <button onclick="updateStatus(${item.ID}, 'approved')" class="flex items-center justify-center w-8 h-8 bg-white border border-green-200 rounded-full text-green-600 hover:bg-green-500 hover:text-white hover:border-green-500 transition-all shadow-sm" title="${t('admin.enroll_badge_approved')}">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button onclick="updateStatus(${item.ID}, 'rejected')" class="flex items-center justify-center w-8 h-8 bg-white border border-red-200 rounded-full text-red-600 hover:bg-red-500 hover:text-white hover:border-red-500 transition-all shadow-sm" title="${t('admin.enroll_badge_rejected')}">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        ` : `<span class="text-gray-400 text-xs">—</span>`}
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    function updatePaginationUI(curr, total) {
        document.getElementById('page-info').textContent = `${t('admin.enroll_page')} ${curr} ${t('admin.enroll_of')} ${total}`;
        document.getElementById('btn-prev').disabled = curr <= 1;
        document.getElementById('btn-next').disabled = curr >= total;
    }

    async function updateStatus(id, newStatus) {
        const msg = newStatus === 'approved' ? t('admin.enroll_confirm_approve') : t('admin.enroll_confirm_reject');
        if (!confirm(msg)) return;

        try {
            const res = await fetch(`/api/admin/enrollments/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });

            if (res.ok) {
                fetchEnrollments();
            } else {
                alert(t('admin.enroll_error_update'));
            }
        } catch (e) {
            console.error(e);
            alert(t('common.network_error'));
        }
    }
</script>

</body>
</html>
{{end}}
