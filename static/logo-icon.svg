<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="ic-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="ic-lw" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="ic-rw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="ic-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#ic-bg)"/>

  <!-- Left wing / page -->
  <path d="M50 78
           C50 78 33 72 22 58
           C14 47 16 33 24 24
           C31 16 41 13 50 13
           Z"
        fill="url(#ic-lw)"/>

  <!-- Right wing / page -->
  <path d="M50 78
           C50 78 67 72 78 58
           C86 47 84 33 76 24
           C69 16 59 13 50 13
           Z"
        fill="url(#ic-rw)"/>

  <!-- Spine shadow -->
  <line x1="50" y1="13" x2="50" y2="78" stroke="rgba(55,48,163,0.18)" stroke-width="1.2"/>

  <!-- Bottom binding arc -->
  <path d="M28 74 Q50 82 72 74" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.35"/>

  <!-- Text lines — left page -->
  <line x1="26" y1="37" x2="46" y2="34" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.28"/>
  <line x1="24" y1="46" x2="46" y2="44" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.28"/>
  <line x1="23" y1="55" x2="46" y2="54" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.23"/>
  <line x1="25" y1="64" x2="46" y2="64" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.18"/>

  <!-- Text lines — right page -->
  <line x1="54" y1="34" x2="74" y2="37" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="54" y1="44" x2="76" y2="46" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="54" y1="54" x2="77" y2="55" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.16"/>
  <line x1="54" y1="64" x2="75" y2="64" stroke="#312e81" stroke-width="1.6" stroke-linecap="round" opacity="0.12"/>

  <!-- Star — glowing gold -->
  <g filter="url(#ic-glow)">
    <polygon
      points="50,3 52.6,10.4 60.5,10.4 54.2,15 56.7,22.4 50,17.8 43.3,22.4 45.8,15 39.5,10.4 47.4,10.4"
      fill="#f59e0b"/>
  </g>

  <!-- Sparkle dots around star -->
  <circle cx="37" cy="9"  r="1.8" fill="#fbbf24" opacity="0.65"/>
  <circle cx="63" cy="9"  r="1.8" fill="#fbbf24" opacity="0.65"/>
  <circle cx="32" cy="17" r="1.2" fill="#fbbf24" opacity="0.45"/>
  <circle cx="68" cy="17" r="1.2" fill="#fbbf24" opacity="0.45"/>
</svg>
